# Experimental branch config for Stage2 subtype-prior rescue (v1).
#
# This config is a sibling of configs/train_stage2_selected_trace.yaml. The
# only meaningful differences are the output dir, dataset/eval paths, and the
# name of the init adapter source (so stage1 produces the same warm-start).
# Learning rate, rank, target_modules, schedule, etc. intentionally mirror
# canonical stage2 so the only experimental variable in this run is the
# subtype_hint + temporary subtype override added by scripts/train_stage2_subtype_rescue.sh.
seed: 42
base_model: nvidia/Nemotron-3-Nano-30B
model_source: kagglehub
model_handle: metric/nemotron-3-nano-30b-a3b-bf16/transformers/default
tokenizer_path: artifacts/_tokenizer_cache/metric_nemotron-3-nano-30b-a3b-bf16_transformers_default
trust_remote_code: true
device_map: auto
torch_dtype: bfloat16
lora:
  rank: 32
  alpha: 64
  dropout: 0.05
  target_modules: ".*\\.(in_proj|out_proj|up_proj|down_proj|q_proj|k_proj|v_proj|o_proj)$"
  bias: none
training:
  output_dir: artifacts/adapter_stage2_subtype_rescue
  dataset_path: data/processed/stage2_subtype_rescue_train.jsonl
  eval_path: data/processed/stage2_subtype_rescue_valid.jsonl
  init_adapter_dir: artifacts/adapter_stage1_format
  num_train_epochs: 2
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 16
  gradient_checkpointing: true
  learning_rate: 8e-5
  warmup_ratio: 0.03
  lr_scheduler_type: cosine
  max_grad_norm: 1.0
  max_seq_length: auto
  auto_floor_seq_length: 1024
  auto_min_seq_length_above_floor: 1536
  auto_max_seq_length_cap: 2048
  logging_steps: 25
  save_steps: 125
  eval_steps: 125
  save_total_limit: 6
  report_to: []
  dataloader_pin_memory: false
  resume_from_checkpoint:
  dry_run: false
inference:
  prompt_mode: chat_thinking
  max_new_tokens: 2048
  do_sample: false
  temperature: 1.0
  top_p: 1.0
  repetition_penalty: 1.0
  save_raw_generations: true
