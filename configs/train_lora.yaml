seed: 42
base_model: nvidia/Nemotron-3-Nano-30B
model_source: kagglehub
model_handle: metric/nemotron-3-nano-30b-a3b-bf16/transformers/default
trust_remote_code: true
device_map: auto
torch_dtype: bfloat16
lora:
  rank: 16
  alpha: 32
  dropout: 0.05
  target_modules: ".*\\.(in_proj|out_proj|up_proj|down_proj)$"
  bias: none
training:
  output_dir: artifacts/adapter
  dataset_path: data/processed/stage_c_train.jsonl
  eval_path: data/processed/stage_c_valid.jsonl
  num_train_epochs: 1
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 1
  learning_rate: 1e-4
  max_seq_length: 1024
  logging_steps: 10
  save_steps: 100
  eval_steps: 100
  save_total_limit: 2
  report_to: []
  dataloader_pin_memory: false
  resume_from_checkpoint:
  dry_run: true
