seed: 42
base_model: nvidia/Nemotron-3-Nano-30B
model_source: kagglehub
model_handle: metric/nemotron-3-nano-30b-a3b-bf16/transformers/default
trust_remote_code: true
device_map: auto
torch_dtype: bfloat16
lora:
  rank: 32
  alpha: 64
  dropout: 0.05
  target_modules: ".*\\.(in_proj|out_proj|up_proj|down_proj)$"
  bias: none
training:
  output_dir: artifacts/adapter_stage2_distill
  dataset_path: data/processed/stage2_distill_train.jsonl
  eval_path: data/processed/stage2_distill_valid.jsonl
  num_train_epochs: 2
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 16
  learning_rate: 8e-5
  max_seq_length: auto
  auto_floor_seq_length: 1024
  auto_min_seq_length_above_floor: 1536
  auto_max_seq_length_cap: 2048
  logging_steps: 10
  save_steps: 100
  eval_steps: 100
  save_total_limit: 2
  report_to: []
  dataloader_pin_memory: false
  resume_from_checkpoint:
  dry_run: true
