seed: 42
base_model: nvidia/Nemotron-3-Nano-30B
model_source: kagglehub
model_handle: metric/nemotron-3-nano-30b-a3b-bf16/transformers/default
tokenizer_path: artifacts/_tokenizer_cache/metric_nemotron-3-nano-30b-a3b-bf16_transformers_default
trust_remote_code: true
device_map: auto
torch_dtype: bfloat16
environment:
  KAGGLEHUB_CACHE: /workspace/.cache/kagglehub
  PYTORCH_CUDA_ALLOC_CONF: expandable_segments:True
lora:
  rank: 32
  alpha: 64
  dropout: 0.05
  target_modules: ".*\\.(in_proj|out_proj|up_proj|down_proj)$"
  bias: none
training:
  output_dir: artifacts/smoke/adapter_stage1_format
  dataset_path: data/processed/smoke/stage1_format_align_train.jsonl
  eval_path: data/processed/smoke/stage1_format_align_valid.jsonl
  num_train_epochs: 1
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 8
  gradient_checkpointing: true
  learning_rate: 1e-4
  warmup_ratio: 0.03
  lr_scheduler_type: linear
  max_grad_norm: 1.0
  max_seq_length: 1024
  logging_steps: 1
  save_steps: 4
  eval_steps: 4
  save_total_limit: 1
  report_to: []
  dataloader_pin_memory: false
  resume_from_checkpoint:
  dry_run: false
inference:
  prompt_mode: chat_thinking
  max_new_tokens: 64
  do_sample: false
  temperature: 1.0
  top_p: 1.0
  repetition_penalty: 1.0
  save_raw_generations: false
