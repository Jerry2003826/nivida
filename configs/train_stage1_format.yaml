seed: 42
base_model: nvidia/Nemotron-3-Nano-30B
model_source: kagglehub
model_handle: metric/nemotron-3-nano-30b-a3b-bf16/transformers/default
tokenizer_path: artifacts/_tokenizer_cache/metric_nemotron-3-nano-30b-a3b-bf16_transformers_default
trust_remote_code: true
device_map: auto
torch_dtype: bfloat16
environment:
  KAGGLEHUB_CACHE: /workspace/.cache/kagglehub
  HF_HOME: /workspace/.cache/huggingface
lora:
  rank: 32
  alpha: 32
  dropout: 0.05
  # Blackwell-managed training: drop Mamba in_proj (causes bf16 grad overflow on
  # the 20480-dim projection), keep Mamba out_proj + MoE up/down + Attention q/k/v/o.
  target_modules: ".*\\.(out_proj|up_proj|down_proj|q_proj|k_proj|v_proj|o_proj)$"
  bias: none
training:
  output_dir: artifacts/adapter_stage1_format
  dataset_path: data/processed/stage1_format_align_train.jsonl
  eval_path: data/processed/stage1_format_align_valid.jsonl
  num_train_epochs: 1
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 16
  gradient_checkpointing: true
  learning_rate: 3.0e-5
  warmup_ratio: 0.05
  lr_scheduler_type: cosine
  max_grad_norm: 1.0
  max_seq_length: 1024
  logging_steps: 10
  save_steps: 100
  eval_steps: 100
  strict_divergence_after_step: 250
  strict_divergence_after_warmup_multiplier: 2.0
  save_total_limit: 5
  load_best_model_at_end: true
  metric_for_best_model: eval_loss
  greater_is_better: false
  report_to: []
  dataloader_pin_memory: false
  resume_from_checkpoint:
  dry_run: false
inference:
  prompt_mode: chat_thinking
  max_new_tokens: 64
  do_sample: false
  temperature: 1.0
  top_p: 1.0
  repetition_penalty: 1.0
  save_raw_generations: false
