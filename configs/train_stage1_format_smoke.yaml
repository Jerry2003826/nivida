seed: 42
base_model: nvidia/Nemotron-3-Nano-30B
model_source: kagglehub
model_handle: metric/nemotron-3-nano-30b-a3b-bf16/transformers/default
tokenizer_path: artifacts/_tokenizer_cache/metric_nemotron-3-nano-30b-a3b-bf16_transformers_default
trust_remote_code: true
device_map: auto
torch_dtype: bfloat16
environment:
  KAGGLEHUB_CACHE: /workspace/.cache/kagglehub
  HF_HOME: /workspace/.cache/huggingface
lora:
  rank: 32
  alpha: 64
  dropout: 0.05
  target_modules: ".*\\.(in_proj|out_proj|up_proj|down_proj|q_proj|k_proj|v_proj|o_proj)$"
  bias: none
training:
  output_dir: artifacts/_smoke_stage1_verify
  dataset_path: data/processed/stage1_format_align_train.jsonl
  eval_path: data/processed/stage1_format_align_valid.jsonl
  num_train_epochs: 0.06
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 16
  gradient_checkpointing: true
  learning_rate: 3.0e-5
  warmup_ratio: 0.1
  lr_scheduler_type: cosine
  max_grad_norm: 1.0
  max_seq_length: 1024
  logging_steps: 5
  save_steps: 500
  eval_steps: 500
  save_total_limit: 1
  report_to: []
  dataloader_pin_memory: false
  dry_run: false
inference:
  prompt_mode: chat_thinking
  max_new_tokens: 64
  do_sample: false
  temperature: 1.0
  top_p: 1.0
  repetition_penalty: 1.0
  save_raw_generations: false
